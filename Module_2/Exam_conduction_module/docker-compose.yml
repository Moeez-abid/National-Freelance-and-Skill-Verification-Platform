services:
  db:
    image: postgres:16-alpine
    container_name: skill-testing-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=module2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d module2"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: skill-testing-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/module2
      - PORT=5000
    env_file:
      - ./server/.env
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    container_name: skill-testing-client
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server

volumes:
  pgdata:
