# Run from pre-built images (no building, no source code needed)
# docker-compose -f docker-compose.hub.yml up -d
services:
  postgres:
    image: manahilmanahil/spm-postgres:15-alpine
    container_name: gamification_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: gamification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: manahilmanahil/spm-gamification-backend:latest
    container_name: gamification_backend
    environment:
      - PORT=3011
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=gamification_db
      - DB_USER=postgres
      - DB_PASSWORD=your_secure_password
      - USE_DUMMY_DB=false
    ports:
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: manahilmanahil/spm-gamification-frontend:latest
    container_name: gamification_frontend
    ports:
      - "5011:80"
    depends_on:
      - backend

volumes:
  postgres_data: