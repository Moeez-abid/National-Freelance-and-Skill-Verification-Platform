services:
  postgres:
    image: postgres:15-alpine
    container_name: gamification_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: gamification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SPM_Centralized_Db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamification_backend
    environment:
      - PORT=3011
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=gamification_db
      - DB_USER=postgres
      - DB_PASSWORD=your_secure_password
      - USE_DUMMY_DB=false
    ports:
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gamification_frontend
    ports:
      - "5011:80"
    depends_on:
      - backend

  # ✅ pgadmin service - MUST be at the SAME LEVEL as postgres, backend, frontend
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gamification_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: