services:
  # ---------- NestJS Backend ----------
  backend:
    build:
      context: ./module-7-backend
      dockerfile: Dockerfile
    container_name: spm_module7_backend
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-spm_db}
      ADMIN_KEY: ${ADMIN_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5007}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spm_module7_frontend
    restart: unless-stopped
    ports:
      - "5007:5007"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3007}
    depends_on:
      - backend
