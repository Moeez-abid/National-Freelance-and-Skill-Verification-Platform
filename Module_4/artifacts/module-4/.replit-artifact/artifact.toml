kind = "web"
previewPath = "/"
title = "Module 4 — Matching & Recommendation"
version = "1.0.0"
id = "artifacts/module-4"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19206

[services.development]
run = "pnpm --filter @workspace/module-4 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/module-4", "run", "build" ]
publicDir = "artifacts/module-4/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19206"
BASE_PATH = "/"
