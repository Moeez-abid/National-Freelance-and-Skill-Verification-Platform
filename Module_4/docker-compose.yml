version: '3.8'

services:
  app:
    build: .
    ports:
      - "5004:5004"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - PORT=5004
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SPM_Centralized_Db.sql:/docker-entrypoint-initdb.d/01_SPM_Centralized_Db.sql
      - ./SPM_Seed_Data.sql:/docker-entrypoint-initdb.d/02_SPM_Seed_Data.sql

volumes:
  postgres_data:
